<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Redirecting... — Parashari Indian Institute</title>
  <link rel="stylesheet" href="assets/css/loader.css">
</head>
<body style="margin: 0; padding: 0; height: 100vh; display: flex; align-items: center; justify-content: center; background: #fff; font-family: sans-serif;">

  <div class="loader-container" style="display: flex; flex-direction: column; align-items: center;">
    <div class="loader"></div>
    <p style="margin-top: 20px; color: #555;">Loading Course...</p>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", function() {
        const urlParams = new URLSearchParams(window.location.search);
        let course = urlParams.get('course');
        let level = urlParams.get('level');
        
        // Aliases fallback
        if (course === 'astrology') course = 'vedic-astrology';
        if (course === 'crystal') course = 'crystal-healing';
        if (course === 'kp astrology') course = 'kp-astrology';
        
        if (course && level) {
            window.location.replace('/courses/' + course + '-' + level + '.html');
        } else {
            window.location.replace('courses.html');
        }
    });
  </script>

</body>
</html>
